<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" property="og:title">
        <meta name="description" content="Contact Form">
        <meta name="keywords" conent="Contact, Form, Support, Message">
        <meta name="author" content="Julion">
        <title>Contact Form</title>
    </head>
    <body>
        <header>
            <h1>Acme Support</h1>
            <nav>
                <a>Home</a>
                <a>Help</a>
                <a>Contact</a>
            </nav>
        </header>
        <main>
            <h1>Contact Us</h1>
            <p>Send us a message and we will get back to you.</p>
                <form action="https://httpbin.org/post" method="post">
                    <p>
                        <label for="name">Full Name</label>
                        <input id="name" name="name" type="text" maxlength="30" required>
                    </p>
                    <p>
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" required>
                    </p>
                    <p>
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject" required>
                            <option value="account">Account</option>
                            <option value="billing">Billing</option>
                            <option value="business">Business Opportunities</option>
                        </select>
                    </p>
                    <p>
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" minlength="30" required></textarea>
                    </p>
                    <p>
                        How did you hear about us?<br>
                        <fieldset>
                            <legend>Source:</legend>
                            <input id="csource1" name="csource" type="radio" value="Search">
                            <label for="csource1">Search</label><br>
                            <input id="csource2" name="csource" type="radio" value="Friend">
                            <label for="csource2">Friend or Associate</label><br>
                            <input id="csource3" name="csource" type="radio" value="SMS">
                            <label for="csource3">Social Media</label>
                        </fieldset>
                    </p>
                    <p>
                        <label>
                        <input type="checkbox" name="newsletter" value="yes">
                        Send me product updates
                        </label>
                    </p>
                    <p>
                        <button type="submit">Send Message</button>
                    </p>
                </form>
        </main>
        <footer>
            <p>© 2026 Acme Support</p>
        </footer>
    </body>
